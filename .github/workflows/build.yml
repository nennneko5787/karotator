name: アプリを自動で作成

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: "stable"

      - name: Flutter pub get
        run: flutter pub get

      # iOS build
      - name: Build .app (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Convert .app to .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/Runner.app
          zip -r karotator.ipa Payload

      # Android build
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cd build/app/outputs/flutter-apk/
          mv app-release.apk karotator.apk

      - name: Generate tag
        id: tag
        run: echo "tag=pre-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pre-release ${{ steps.tag.outputs.tag }}
          prerelease: true
          files: |
            build/ios/iphoneos/karotator.ipa
            build/app/outputs/flutter-apk/karotator.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
