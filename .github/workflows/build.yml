name: アプリを自動で作成

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install Flutter
        run: git clone https://github.com/flutter/flutter.git

      - name: Add path
        run: echo "$(pwd)/flutter/bin" >> $GITHUB_PATH

      - name: Flutter pub get
        run: flutter pub get

      # iOS build
      - name: Build .ipa (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Move .ipa
        run: |
          cp build/ios/ipa/*.ipa build/ios/iphoneos/karotator.ipa || \
          cp build/ios/archive/Runner.xcarchive/Products/Applications/../../../Products/Applications/../karotator.ipa build/ios/iphoneos/karotator.ipa || true
          find build -name "*.ipa" | head -5

      # Android build
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cd build/app/outputs/flutter-apk/
          mv app-release.apk karotator.apk

      # タグ作成（日時ベース）
      - name: Generate tag
        id: tag
        run: echo "tag=pre-$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      # Release作成
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pre-release ${{ steps.tag.outputs.tag }}
          prerelease: true
          files: |
            build/ios/iphoneos/karotator.ipa
            build/app/outputs/flutter-apk/karotator.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
