name: アプリを自動で作成

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"               # ← 元に戻す
          channel: "stable"

      - name: Flutter pub get
        run: flutter pub get

      - name: Lint check
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk/
          mv app-arm64-v8a-release.apk   karotator-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk karotator-armeabi-v7a.apk
          mv app-x86_64-release.apk      karotator-x86_64.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: build/app/outputs/flutter-apk/karotator-*.apk

  build-ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1        # ← これは残す
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"               # ← 元に戻す
          channel: "stable"

      - name: Flutter pub get
        run: flutter pub get

      - name: Lint check
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Build .app (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Convert .app to .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/Runner.app
          zip -r karotator.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa-file
          path: build/ios/iphoneos/karotator.ipa

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate tag
        id: tag
        run: echo "tag=pre-$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pre-release ${{ steps.tag.outputs.tag }}
          prerelease: true
          files: |
            artifacts/karotator.ipa
            artifacts/karotator-arm64-v8a.apk
            artifacts/karotator-armeabi-v7a.apk
            artifacts/karotator-x86_64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
