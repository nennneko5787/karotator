name: アプリを自動で作成

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git
          cd flutter
          git checkout 247ce47aabb58cceb4c9e5203757185db8daf2ec

      - name: Add path
        run: echo "$(pwd)/flutter/bin" >> $GITHUB_PATH

      - name: Flutter pub get
        run: flutter pub get

      # iOS build
      - name: Build iOS (config only)
        run: flutter build ios --release --config-only

      - name: Build .app with xcodebuild (no codesign)
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/ios_build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ARCHS=arm64 \
            build

      - name: Convert .app to .ipa
        run: |
          APP_PATH=$(find build/ios_build -name "Runner.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/Runner.app
          zip -r build/ios/iphoneos/karotator.ipa Payload

      # Android build
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cd build/app/outputs/flutter-apk/
          mv app-release.apk karotator.apk

      # タグ作成（日時ベース）
      - name: Generate tag
        id: tag
        run: echo "tag=pre-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      # Release作成
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pre-release ${{ steps.tag.outputs.tag }}
          prerelease: true
          files: |
            build/ios/iphoneos/karotator.ipa
            build/app/outputs/flutter-apk/karotator.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
